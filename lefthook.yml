commit-msg:
  commands:
    commitlint:
      run: pnpm exec commitlint --edit {1}

pre-commit:
  commands:
    format:
      glob: "*.{js,ts,json,md}"
      run: pnpm exec oxfmt {staged_files} && git add {staged_files}
    lint:
      glob: "*.{js,ts}"
      run: pnpm run lint
    typecheck:
      glob: "*.{ts}"
      run: pnpm run typecheck
    test:
      run: pnpm test

pre-push:
  commands:
    format:
      run: |
        pnpm run format
        if ! git diff --quiet; then
          git diff --name-only -z | xargs -0 git add
          git commit --amend --no-edit
        fi
    build:
      run: pnpm run build
    lint:
      run: pnpm run lint
    typecheck:
      run: pnpm run typecheck
    test:
      run: pnpm test
